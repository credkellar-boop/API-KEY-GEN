name: API-KEY-GEN CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Python Job
  test-python:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Run Python Unit Tests
      # PYTHONPATH=. ensures the root directory is in the import path
      run: |
        PYTHONPATH=. python -m unittest discover -s tests

  # 2. Node.js Job
  test-node:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        
    - name: Run Node Tests
      run: npm test

  # 3. Go Job
  test-go:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"
        
    - name: Run Go Tests
      run: go test -v ./...
