name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: make test-all
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          
